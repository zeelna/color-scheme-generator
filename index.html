<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content= "width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
    <title>Color Scheme Generator</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <nav id="navigation" class="container shadow">
            <form id="form" class="nav-options">
                <input
                    required
                    type="color"
                    value="#E63E62"
                    id="color-id"
                    name="seed"
                    aria-label="Choose a seed color:"
                >
                <select required id="scheme-id" name="scheme" aria-label="Choose a color scheme mode">
                    <option value="monochrome" selected>Monochrome</option>
                    <option value="monochrome-light">Monochrome-Light</option>
                    <option value="analogic">Analogic</option>
                    <option value="complement">Complement</option>
                    <option value="analogic-complement">Analogic-Complement</option>
                    <option value="triad">Triad</option>
                    <option value="quad">Quad</option>
                </select>
                <button id="btn-get-color" class="btn-get-color">Get color scheme</button>
            </form>
        </nav>
        <section id="section-colors" class="container">
            <!-- Index.js assigns colors per API call-->
        </section>
    </main>
    <!-- Reference JavaScript -->
    <script src="index.js" type="module"></script>
</body>
</html>
